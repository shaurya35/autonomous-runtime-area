id: SRE-0006
title: "/products pagination off-by-one (skips first item)"
app: shop-api
category: code
difficulty: easy

inject:
  - type: code_change
    file: src/routes/products.rs
    diff: |
      --- a/src/routes/products.rs
      +++ b/src/routes/products.rs
      @@ -48,7 +48,7 @@ async fn list_products(
           let page = pagination.page.max(1);
           let per_page = pagination.per_page.clamp(1, 100);
      -    // Correct formula: offset = (page - 1) * per_page (page is 1-indexed)
      -    let offset = (page - 1) * per_page;
      +    // BUG: page is 1-indexed but formula treats it as 0-indexed, skipping first page
      +    let offset = page * per_page;

ground_truth:
  root_cause: >
    The pagination offset calculation uses `page * per_page` instead of
    `(page - 1) * per_page`. Since page is 1-indexed, requesting page=1
    with per_page=10 yields OFFSET=10, skipping the first 10 products.
    Page 2 starts at item 21, etc. The first page is effectively unreachable.
  fix_type: code_change
  fix_diff: |
    --- a/src/routes/products.rs
    +++ b/src/routes/products.rs
    @@ -48,7 +48,7 @@ async fn list_products(
         let page = pagination.page.max(1);
         let per_page = pagination.per_page.clamp(1, 100);
    -    let offset = page * per_page;
    +    let offset = (page - 1) * per_page;

agent_sees:
  alert: "Customer complaint: product listing missing first items"
  symptoms:
    - "GET /products?page=1&per_page=10 returns items starting from id=11, not id=1"
    - "Product id=1 (Widget A) never appears in any page response"
    - "Total count in response is correct but data is offset by one page"
    - "No 500 errors — the logic is wrong, not crashed"
  recent_deploys:
    - "v1.3.0 deployed yesterday — refactored pagination to support variable page sizes"

pre_fix_tests:
  - "curl -s http://localhost:8080/products?page=1&per_page=3 | python3 -c \"import sys,json; d=json.load(sys.stdin); assert d['data'][0]['id'] == 1, f'first item should be id=1, got: {d[\\\"data\\\"][0][\\\"id\\\"]}'\""
post_fix_tests:
  - "curl -s http://localhost:8080/products?page=1&per_page=3 | python3 -c \"import sys,json; d=json.load(sys.stdin); assert d['data'][0]['id'] == 1\""
  - "curl -s 'http://localhost:8080/products?page=2&per_page=3' | python3 -c \"import sys,json; d=json.load(sys.stdin); assert d['data'][0]['id'] == 4\""
