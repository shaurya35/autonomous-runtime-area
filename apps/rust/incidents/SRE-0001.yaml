id: SRE-0001
title: "Login crashes on missing password (unwrap() panic)"
app: shop-api
category: code
difficulty: easy

inject:
  - type: code_change
    file: src/routes/auth.rs
    diff: |
      --- a/src/routes/auth.rs
      +++ b/src/routes/auth.rs
      @@ -104,9 +104,7 @@ async fn login(
           let email = body
               .email
               .filter(|e| !e.is_empty())
               .ok_or_else(|| AppError::BadRequest("email is required".to_string()))?;
      -    // Use Option<String> for password — not unwrap
      -    let password: Option<String> = body.password.filter(|p| !p.is_empty());
      -    let password = password
      -        .ok_or_else(|| AppError::BadRequest("password is required".to_string()))?;
      +    let password = body.password.clone().unwrap();

ground_truth:
  root_cause: >
    `login` handler calls `.unwrap()` on `body.password` which is `Option<String>`.
    When a client sends `{"email":"x@example.com"}` without a password field,
    the `Option` is `None` and `unwrap()` panics, crashing the Axum task and
    returning a 500 instead of 400 Bad Request.
  fix_type: code_change
  fix_diff: |
    --- a/src/routes/auth.rs
    +++ b/src/routes/auth.rs
    @@ -104,7 +104,9 @@ async fn login(
         let email = body
             .email
             .filter(|e| !e.is_empty())
             .ok_or_else(|| AppError::BadRequest("email is required".to_string()))?;
    -    let password = body.password.clone().unwrap();
    +    let password: Option<String> = body.password.filter(|p| !p.is_empty());
    +    let password = password
    +        .ok_or_else(|| AppError::BadRequest("password is required".to_string()))?;

agent_sees:
  alert: "Error rate spike: POST /auth/login returning 500"
  symptoms:
    - "HTTP 500 on POST /auth/login when password field is omitted"
    - "Logs show: thread panicked at 'called `Option::unwrap()` on a `None` value'"
    - "Error counter incrementing on every missing-password login attempt"
  recent_deploys:
    - "v1.2.0 deployed 10 minutes ago — refactored login input validation"

pre_fix_tests:
  - "curl -sf -X POST http://localhost:8080/auth/login -H 'Content-Type: application/json' -d '{\"email\":\"x@example.com\"}' | grep -v 500"
post_fix_tests:
  - "curl -s -X POST http://localhost:8080/auth/login -H 'Content-Type: application/json' -d '{\"email\":\"x@example.com\"}' | python3 -c \"import sys,json; d=json.load(sys.stdin); assert d.get('error'), f'expected error response, got: {d}'\""
  - "curl -sf http://localhost:8080/healthz | python3 -c \"import sys,json; assert json.load(sys.stdin)['status'] == 'ok'\""
